<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прости</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Lora:ital@0;1&display=swap');

:root {
  --rose: #c9748a;
  --petal: #e8a0b0;
  --soft: #f5dde3;
  --cream: #fdf6f0;
  --text: #5a3040;
  --muted: #9a7080;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Lora', serif;
  overflow: hidden;
  cursor: default;
}

.petal-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.petal {
  position: absolute;
  top: -40px;
  border-radius: 150% 0 150% 0;
  opacity: 0;
  animation: fall linear infinite;
}

@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
  5%   { opacity: 0.7; }
  95%  { opacity: 0.4; }
  100% { transform: translateY(110vh) rotate(720deg) translateX(var(--sway)); opacity: 0; }
}

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(232,160,176,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(201,116,138,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 70% 40% at 50% 50%, rgba(245,221,227,0.3) 0%, transparent 80%);
}

.scene {
  perspective: 1200px;
  z-index: 10;
  position: relative;
}

.card {
  width: min(380px, 92vw);
  background: white;
  border-radius: 24px;
  box-shadow:
    0 4px 30px rgba(180, 100, 120, 0.12),
    0 1px 4px rgba(180, 100, 120, 0.08);
  padding: 52px 40px 40px;
  text-align: center;
  position: relative;
  animation: cardIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  transition: transform 0.15s ease;
}

@keyframes cardIn {
  from { opacity: 0; transform: scale(0.85) translateY(30px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.flower-top {
  position: absolute;
  top: -38px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.flower {
  position: relative;
  width: 44px;
  height: 44px;
  animation: sway 3s ease-in-out infinite;
}
.flower:nth-child(1) { width: 34px; height: 34px; animation-delay: 0.2s; }
.flower:nth-child(3) { width: 34px; height: 34px; animation-delay: 0.5s; }

@keyframes sway {
  0%, 100% { transform: rotate(-4deg); }
  50%       { transform: rotate(4deg); }
}

.flower svg { width: 100%; height: 100%; }

.sorry-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(3.2rem, 14vw, 4.5rem);
  color: var(--rose);
  line-height: 1;
  margin-top: 10px;
  animation: textIn 1.4s cubic-bezier(0.34, 1.3, 0.64, 1) 0.3s both;
}

@keyframes textIn {
  from { opacity: 0; transform: translateY(20px) scale(0.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.divider {
  margin: 20px auto;
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--petal), transparent);
  animation: fadeIn 1s 0.8s both;
}

.subtitle {
  font-style: italic;
  font-size: 1.1rem;
  color: var(--muted);
  line-height: 1.7;
  animation: fadeIn 1s 1s both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.btn-area {
  margin-top: 32px;
  animation: fadeIn 1s 1.3s both;
}

.btn-label {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.btn {
  padding: 12px 24px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  font-family: 'Lora', serif;
  font-size: 0.95rem;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.btn:active { transform: scale(0.96); }

.btn-yes {
  background: linear-gradient(135deg, var(--rose), #b05870);
  color: white;
  box-shadow: 0 4px 16px rgba(201,116,138,0.35);
}
.btn-yes:hover { box-shadow: 0 6px 20px rgba(201,116,138,0.5); transform: translateY(-2px); }

.btn-no {
  background: transparent;
  color: var(--muted);
  border: 1.5px solid #e0c8ce;
  transition: all 0.2s;
}
.btn-no:hover { border-color: var(--petal); color: var(--rose); }

.response {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  animation: fadeIn 0.6s ease both;
}
.response.active { display: flex; }

.response-emoji {
  font-size: 3rem;
  animation: bounceIn 0.6s cubic-bezier(0.34, 1.7, 0.64, 1) both;
}

@keyframes bounceIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.response-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1.8rem;
  color: var(--rose);
}

.response-sub {
  font-style: italic;
  font-size: 0.95rem;
  color: var(--muted);
  line-height: 1.7;
}

.btn-back {
  margin-top: 8px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Lora', serif;
  font-size: 0.85rem;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.burst {
  position: fixed;
  pointer-events: none;
  z-index: 100;
  font-size: 1.5rem;
  animation: burstAnim 1s ease both;
}
@keyframes burstAnim {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-90px) scale(0.4); }
}

.card-petals {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 28px;
  opacity: 0.4;
}
.card-petal {
  width: 8px; height: 12px;
  background: var(--petal);
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
}
.card-petal:nth-child(2) { background: #d4899a; transform: rotate(45deg); border-radius: 50% 50% 0 50%; }
.card-petal:nth-child(3) { background: #e8b4bf; transform: rotate(-45deg); }
</style>
</head>
<body>

<div class="bg"></div>
<div class="petal-container" id="petals"></div>

<div class="scene">
  <div class="card" id="card">

    <div class="flower-top">
      <div class="flower">
        <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#e8a0b0" opacity="0.85"/>
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#e8a0b0" opacity="0.85" transform="rotate(60 25 25)"/>
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#e8a0b0" opacity="0.85" transform="rotate(120 25 25)"/>
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#d4899a" opacity="0.7" transform="rotate(180 25 25)"/>
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#d4899a" opacity="0.7" transform="rotate(240 25 25)"/>
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#d4899a" opacity="0.7" transform="rotate(300 25 25)"/>
          <circle cx="25" cy="25" r="7" fill="#f9e4e9"/>
          <circle cx="25" cy="25" r="4" fill="#e8b0be"/>
        </svg>
      </div>
      <div class="flower">
        <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="25" cy="10" rx="8" ry="13" fill="#c9748a" opacity="0.9"/>
          <ellipse cx="25" cy="10" rx="8" ry="13" fill="#c9748a" opacity="0.9" transform="rotate(72 25 25)"/>
          <ellipse cx="25" cy="10" rx="8" ry="13" fill="#b05870" opacity="0.8" transform="rotate(144 25 25)"/>
          <ellipse cx="25" cy="10" rx="8" ry="13" fill="#b05870" opacity="0.8" transform="rotate(216 25 25)"/>
          <ellipse cx="25" cy="10" rx="8" ry="13" fill="#c9748a" opacity="0.9" transform="rotate(288 25 25)"/>
          <circle cx="25" cy="25" r="8" fill="#fdeef2"/>
          <circle cx="25" cy="25" r="5" fill="#e8b0be"/>
        </svg>
      </div>
      <div class="flower">
        <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#e8a0b0" opacity="0.85"/>
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#e8a0b0" opacity="0.85" transform="rotate(60 25 25)"/>
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#e8a0b0" opacity="0.85" transform="rotate(120 25 25)"/>
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#d4899a" opacity="0.7" transform="rotate(240 25 25)"/>
          <ellipse cx="25" cy="12" rx="7" ry="11" fill="#d4899a" opacity="0.7" transform="rotate(300 25 25)"/>
          <circle cx="25" cy="25" r="7" fill="#f9e4e9"/>
          <circle cx="25" cy="25" r="4" fill="#e8b0be"/>
        </svg>
      </div>
    </div>

    <!-- Main content -->
    <div id="main-content">
      <div class="sorry-text">Прости</div>
      <div class="divider"></div>
      <div class="subtitle">Давай мириться 🥺</div>

      <div class="btn-area">
        <div class="btn-label">Твой ответ</div>
        <div class="buttons">
          <button class="btn btn-yes" onclick="answer('yes', event)">Миримся 🤍</button>
          <button class="btn btn-no" onclick="answer('no', event)">Нет</button>
        </div>
      </div>

      <div class="card-petals">
        <div class="card-petal"></div>
        <div class="card-petal"></div>
        <div class="card-petal"></div>
      </div>
    </div>

    <!-- Yes -->
    <div class="response" id="resp-yes">
      <div class="response-emoji">🌸</div>
      <div class="response-text">Ура, мир!</div>
      <div class="response-sub">Я так рад 🤍<br>гамнеська)))</div>
      <button class="btn-back" onclick="reset()">← назад</button>
    </div>

    <!-- No -->
    <div class="response" id="resp-no">
      <div class="response-emoji">🥺</div>
      <div class="response-text">Понимаю...НО</div>
      <div style="font-family:'Playfair Display',serif;font-style:italic;font-size:2.2rem;color:var(--rose);opacity:0.5;margin-top:4px;">ПРАСТИ 🥺</div>
      <button class="btn-back" onclick="reset()">← попробовать снова</button>
    </div>

  </div>
</div>

<script>
const colors = ['#e8a0b0','#c9748a','#f5c5d0','#d4899a','#f0d0d8','#e8b4bf'];

function createPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  const size = Math.random() * 14 + 6;
  const left = Math.random() * 100;
  const dur = Math.random() * 8 + 7;
  const delay = Math.random() * 8;
  const sway = (Math.random() - 0.5) * 120;
  const color = colors[Math.floor(Math.random() * colors.length)];
  el.style.cssText = `left:${left}%;width:${size}px;height:${size*0.7}px;background:${color};--sway:${sway}px;animation-duration:${dur}s;animation-delay:${delay}s;`;
  document.getElementById('petals').appendChild(el);
  setTimeout(() => el.remove(), (dur + delay + 1) * 1000);
}
for (let i = 0; i < 30; i++) createPetal();
setInterval(createPetal, 600);

// Card tilt on mouse
const card = document.getElementById('card');
document.addEventListener('mousemove', e => {
  const r = card.getBoundingClientRect();
  const dx = (e.clientX - (r.left + r.width/2)) / (window.innerWidth/2);
  const dy = (e.clientY - (r.top + r.height/2)) / (window.innerHeight/2);
  card.style.transform = `rotateY(${dx*5}deg) rotateX(${-dy*5}deg)`;
});
document.addEventListener('mouseleave', () => card.style.transform = '');

function spawnBurst(x, y) {
  const emojis = ['🌸','💗','🌷','✨','💕','🌺'];
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'burst';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (x + (Math.random()-0.5)*140) + 'px';
    el.style.top  = (y + (Math.random()-0.5)*80) + 'px';
    el.style.animationDelay = (Math.random()*0.4) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

function answer(type, e) {
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('resp-' + type).classList.add('active');
  if (type === 'yes') {
    spawnBurst(e.clientX, e.clientY);
    for (let i = 0; i < 20; i++) createPetal();
  }
}

function reset() {
  document.getElementById('resp-yes').classList.remove('active');
  document.getElementById('resp-no').classList.remove('active');
  document.getElementById('main-content').style.display = '';
}
</script>
</body>
</html>
